<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>晚安华师·发呆许可证 final</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(145deg, #f7f3e9 0%, #e8f0e6 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', 'PingFang SC', sans-serif;
      padding: 20px;
    }
    .card-generator {
      max-width: 540px; width: 100%;
      background: rgba(255,255,245,0.7); backdrop-filter: blur(12px);
      border-radius: 48px 48px 36px 36px;
      padding: 28px 24px 32px;
      border: 1px solid rgba(180,200,160,0.3);
    }
    h2 { font-weight: 400; font-size: 1.5rem; color: #3a5e3c; margin-bottom: 6px; }
    .sub-line { display: flex; justify-content: space-between; margin-bottom: 20px; }
    .sub-line p { color: #6a7e5c; font-size: 0.95rem; }
    .badge { background: #ffffffc0; border-radius: 30px; padding: 4px 16px; font-size: 0.8rem; color: #4b6b3e; }
    .license-wrapper { 
      background: #fefcf0; border-radius: 36px; padding: 16px; 
      margin-bottom: 24px; border: 1px solid #e2ebda;
      user-select: none; -webkit-user-select: none;
    }
    .svg-container { width: 100%; border-radius: 24px; overflow: hidden; background: #fef9e8; }
    svg { width: 100%; height: auto; display: block; font-family: 'Caveat','KaiTi',cursive; }
    
    .input-panel { display: flex; flex-wrap: wrap; align-items: center; gap: 12px; margin-top: 8px; }
    
    /* 模拟输入框：外观和之前一样，但内部是div */
    .name-input-area { 
      flex: 1 1 200px; display: flex; align-items: center; 
      background: white; border-radius: 40px; border: 1px solid #cbdcc0; 
      height: 36px; padding: 0 14px; box-shadow: 0 2px 6px rgba(0,0,0,0.02);
    }
    .name-input-area label { color: #4d6b43; font-weight: 500; margin-right: 6px; white-space: nowrap; font-size: 0.9rem; }
    .editable-name {
      flex: 1; outline: none; border: none; background: transparent;
      font-size: 0.9rem; color: #1f3a1a; line-height: 36px;
      white-space: nowrap; overflow-x: auto; -webkit-overflow-scrolling: touch;
      min-width: 0;
    }
    .editable-name:empty:before {
      content: attr(placeholder); color: #b3c7a8; font-style: italic;
    }
    .action-buttons { display: flex; gap: 8px; }
    .btn { 
      background: #eef3e9; border: 1px solid #b7cfaa; padding: 0 22px; 
      border-radius: 48px; font-size: 1rem; font-weight: 500; color: #2a4b25; 
      cursor: pointer; height: 36px; line-height: 36px; white-space: nowrap;
    }
    .btn-primary { background: #5f8b4b; border-color: #3f6a31; color: white; }
    .footnote { display: flex; margin-top: 16px; font-size: 0.75rem; color: #7a9470; gap: 16px; }
    
    @media (max-width: 520px) {
      .card-generator { padding: 20px 16px 24px; }
      .input-panel { flex-direction: column; }
      .name-input-area { width: 100%; }
      .btn { width: 100%; justify-content: center; }
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="card-generator">
  <h2>🌿 发呆许可证·生成器 <span style="font-size:12px;color:#a0b0a0;">final</span></h2>
  <div class="sub-line">
    <p>「允许浪费10分钟 · 合法放空」</p>
    <div class="badge">公园20分钟效应·华师特别版</div>
  </div>

  <div class="license-wrapper" id="licenseWrapper">
    <div class="svg-container">
      <svg viewBox="0 0 540 900" preserveAspectRatio="xMidYMid meet">
        <defs>
          <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#fffdf5"/><stop offset="60%" stop-color="#fbf5e3"/><stop offset="100%" stop-color="#f3efdb"/>
          </linearGradient>
          <linearGradient id="stampGrad" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#b04e3f" stop-opacity="0.85"/><stop offset="100%" stop-color="#7e3a2e" stop-opacity="0.9"/>
          </linearGradient>
          <filter id="softShadow"><feDropShadow dx="3" dy="5" stdDeviation="6" flood-color="#4d6030" flood-opacity="0.1"/></filter>
          <filter id="stampBlur"><feGaussianBlur stdDeviation="0.8"/></filter>
        </defs>
        <rect x="20" y="20" width="500" height="860" rx="36" fill="url(#bgGrad)" stroke="#c3d2b6" stroke-width="3" filter="url(#softShadow)"/>
        <rect x="35" y="35" width="470" height="830" rx="28" fill="none" stroke="#b8cfaa" stroke-width="1.8" stroke-dasharray="12 8" opacity="0.7"/>
        <rect x="45" y="45" width="450" height="810" rx="20" fill="none" stroke="#d4e2c6" stroke-width="1" opacity="0.5"/>
        <!-- 装饰插画 -->
        <g transform="translate(60, 70)" opacity="0.7"><rect x="0" y="8" width="28" height="22" rx="2" fill="#d9c8a2" stroke="#a28b5e" stroke-width="1.2"/><rect x="0" y="8" width="14" height="22" fill="#f1e7ce" stroke="#a28b5e" stroke-width="0.8"/><line x1="14" y1="8" x2="14" y2="30" stroke="#a28b5e" stroke-width="1"/><path d="M-8,10 C-18,2 -20,-8 -10,-12 C-5,-14 0,-8 -2,2 Z" fill="#a1b88c" stroke="#6f8a5e" stroke-width="0.8"/></g>
        <g transform="translate(440, 70)" opacity="0.6"><path d="M10,30 C20,20 30,10 25,0 C22,-5 15,-2 12,8 C10,14 8,20 10,30 Z" fill="#b4cf9d" stroke="#7f9a6e" stroke-width="1"/><circle cx="32" cy="18" r="6" fill="#f7d1b3" stroke="#c2946e"/></g>
        <g transform="translate(60, 750)" opacity="0.65"><rect x="0" y="20" width="36" height="24" rx="3" fill="#c1ae89" stroke="#8f7b58"/><path d="M40,30 C50,22 48,12 38,10 C32,9 28,16 32,24 Z" fill="#92aa7a" stroke="#5f7450"/></g>
        <g transform="translate(430, 760)" opacity="0.6"><rect x="0" y="15" width="32" height="22" rx="2" fill="#e3cdaf" stroke="#a4865e"/><path d="M-6,18 C-16,10 -14,0 -4,-2 C2,-3 6,4 2,14 Z" fill="#b8cfaa"/></g>

        <text x="270" y="130" text-anchor="middle" font-family="'Caveat','KaiTi',cursive" font-size="38" font-weight="700" fill="#3c5e35">华师校园发呆许可证</text>
        <text x="270" y="160" text-anchor="middle" font-family="'Caveat','楷体',cursive" font-size="16" fill="#7a9a6a">晚安华师</text>
        <text x="270" y="190" text-anchor="middle" font-family="'Caveat','楷体',cursive" font-size="16" fill="#6f8b60">—— 合法浪费十分钟·心灵呼吸证 ——</text>
        <line x1="100" y1="215" x2="440" y2="215" stroke="#b3c7a3" stroke-width="1.5" stroke-dasharray="4 6"/>
        
        <text x="150" y="255" font-family="'Segoe UI',sans-serif" font-size="21" fill="#4b6042">允许</text>
        <text x="210" y="255" font-family="'Segoe UI',sans-serif" font-size="21" fill="#4b6042">:</text>
        <text id="licenseName" x="240" y="255" font-family="'Caveat','KaiTi',cursive" font-size="32" font-weight="700" fill="#2b4829" text-anchor="start">华师小晚</text>
        <text x="380" y="285" font-family="'Segoe UI',sans-serif" font-size="16" fill="#6f8b60">在华师校园</text>
        <line x1="150" y1="300" x2="440" y2="300" stroke="#7f9a71" stroke-width="1.8" stroke-dasharray="3 4" opacity="0.5"/>
        
        <text id="activityText" x="270" y="365" text-anchor="middle" font-family="'Caveat','KaiTi',cursive" font-size="30" fill="#386035" font-weight="700">看云 10 分钟</text>
        
        <g font-family="'Segoe UI',sans-serif" font-size="18" fill="#506545">
          <text x="150" y="430">有效期</text>
          <text x="230" y="430" font-family="'Caveat',cursive" font-size="24" fill="#386035">自签发起 · 即刻生效</text>
          <text x="150" y="465">签发机关</text>
          <text x="250" y="465" font-family="'Caveat','楷体',cursive" font-size="22" fill="#386035">晚安华师 · 心灵休憩站</text>
        </g>
        
        <text x="150" y="510" font-family="'Segoe UI',sans-serif" font-size="15" fill="#859e78">编号</text>
        <text id="licenseId" x="210" y="510" font-family="monospace" font-size="15" fill="#5f7a50">SCNU·20260416·019</text>
        <text x="150" y="540" font-family="'Segoe UI',sans-serif" font-size="15" fill="#859e78">签发日期</text>
        <text id="issueDate" x="250" y="540" font-family="monospace" font-size="15" fill="#5f7a50">2026.04.16</text>
        
        <g transform="translate(420, 540) rotate(-12)">
          <circle cx="0" cy="0" r="38" fill="none" stroke="url(#stampGrad)" stroke-width="4.5" opacity="0.7" filter="url(#stampBlur)"/>
          <circle cx="0" cy="0" r="32" fill="none" stroke="#b05a4a" stroke-width="1.5" stroke-dasharray="3 3" opacity="0.7"/>
          <text x="0" y="-4" text-anchor="middle" font-family="'Caveat','楷体',cursive" font-size="19" font-weight="700" fill="#9f4e3e" opacity="0.85">准许发呆</text>
          <text x="0" y="18" text-anchor="middle" font-family="'Caveat',cursive" font-size="13" fill="#a85e4d" opacity="0.8">放空专用</text>
        </g>
        
        <text x="270" y="640" text-anchor="middle" font-family="'Caveat','楷体',cursive" font-size="23" fill="#859e74">人生不是赶路，偶尔也要看看云 ☁️</text>
        <text x="270" y="680" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="13" fill="#a4b99a">* 本证仅供心灵放松，逾期可续杯（再发一次呆）*</text>
      </svg>
    </div>
  </div>

  <div class="input-panel">
    <div class="name-input-area">
      <label>✨ 你的名字</label>
      <div id="editableName" class="editable-name" contenteditable="true" placeholder="韦一敏">华师小晚</div>
    </div>
    <div class="action-buttons">
      <button class="btn btn-primary" id="generateBtn">🎟️ 生成我的许可证</button>
      <button class="btn btn-outline" id="randomBtn">🎲 随机昵称</button>
    </div>
  </div>
  <div class="footnote">
    <i>📸 长按卡片保存</i>
    <span>🌱 今日发呆指数 · 宜放空</span>
  </div>
</div>

<script>
  (function(){
    const editableDiv = document.getElementById('editableName');
    const licenseNameText = document.getElementById('licenseName');
    const licenseIdText = document.getElementById('licenseId');
    const issueDateText = document.getElementById('issueDate');
    const activityText = document.getElementById('activityText');

    // 初始化日期和编号
    function getFormattedDate() {
      const d = new Date();
      return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
    }
    function generateLicenseId() {
      const datePart = new Date().toISOString().slice(0,10).replace(/-/g,'');
      return `SCNU·${datePart}·${Math.floor(Math.random()*900+100)}`;
    }
    
    const randomNicknames = ["砚湖发呆鹅","图书馆瞌睡虫","一课看云人","文化广场遛弯侠","西区炒粉er","异木棉观察员","教信熬夜冠军","小晚本晚","阿华甜","不赶due的仙人","东九散步猫","陶园早餐队","明德广场鸽子","商学院预备总裁","心院解忧草"];
    const activityList = ["看云 10 分钟","发呆 10 分钟","闲逛 10 分钟","晒太阳 10 分钟","听鸟叫 10 分钟","数树叶 10 分钟","喝奶茶 10 分钟","喂蚊子 10 分钟","躺草坪 10 分钟","荡秋千 10 分钟","看日落 10 分钟","吹晚风 10 分钟","听播客 10 分钟","翻闲书 10 分钟","逗小猫 10 分钟"];

    function updateLicenseDisplay(name) {
      let displayName = name.trim() || '华师发呆人';
      licenseNameText.textContent = displayName;
      let fontSize = 32;
      if (displayName.length >= 9) fontSize = 28;
      if (displayName.length >= 11) fontSize = 24;
      licenseNameText.setAttribute('font-size', fontSize);
      licenseIdText.textContent = generateLicenseId();
      issueDateText.textContent = getFormattedDate();
      activityText.textContent = activityList[Math.floor(Math.random() * activityList.length)];
    }

    function refreshFromInput() {
      updateLicenseDisplay(editableDiv.textContent);
    }

    function setRandomNickname() {
      const nickname = randomNicknames[Math.floor(Math.random() * randomNicknames.length)];
      editableDiv.textContent = nickname;
      updateLicenseDisplay(nickname);
    }

    document.getElementById('generateBtn').addEventListener('click', (e) => {
      e.preventDefault();
      refreshFromInput();
    });
    document.getElementById('randomBtn').addEventListener('click', (e) => {
      e.preventDefault();
      setRandomNickname();
    });
    editableDiv.addEventListener('keypress', (e) => {
      if(e.key === 'Enter') {
        e.preventDefault();
        refreshFromInput();
      }
    });
    window.addEventListener('DOMContentLoaded', () => {
      editableDiv.textContent = '华师小晚';
      updateLicenseDisplay('华师小晚');
    });

    // 长按保存逻辑 (保留)
    const licenseWrapper = document.querySelector('.license-wrapper');
    const svgElement = document.querySelector('svg');
    let pressTimer;
    let startX, startY;
    const MOVE_THRESHOLD = 10;
    function downloadPNG(){
      const cloneSvg = svgElement.cloneNode(true);
      const svgData = new XMLSerializer().serializeToString(cloneSvg);
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');
      const img = new Image();
      canvas.width=540; canvas.height=900;
      img.onload = function(){
        ctx.fillStyle='#fefcf0'; ctx.fillRect(0,0,540,900);
        ctx.drawImage(img,0,0);
        const a = document.createElement('a');
        a.download = `发呆许可证_${new Date().toISOString().slice(0,10).replace(/-/g,'')}.png`;
        a.href = canvas.toDataURL('image/png');
        a.click();
        alert('✅ 许可证已保存');
      };
      const blob = new Blob([svgData],{type:'image/svg+xml'});
      img.src = URL.createObjectURL(blob);
    }
    licenseWrapper.addEventListener('touchstart', (e) => {
      if(e.target.closest('.btn, .editable-name')) return;
      const touch = e.touches[0];
      startX = touch.clientX; startY = touch.clientY;
      pressTimer = setTimeout(() => { downloadPNG(); pressTimer = null; }, 600);
    }, {passive: true});
    licenseWrapper.addEventListener('touchmove', (e) => {
      if(!pressTimer) return;
      const touch = e.touches[0];
      if(Math.abs(touch.clientX-startX) > MOVE_THRESHOLD || Math.abs(touch.clientY-startY) > MOVE_THRESHOLD) {
        clearTimeout(pressTimer); pressTimer = null;
      }
    });
    licenseWrapper.addEventListener('touchend', () => { if(pressTimer) clearTimeout(pressTimer); });
    licenseWrapper.addEventListener('contextmenu', (e) => { if(!e.target.closest('.editable-name')) e.preventDefault(); });
  })();
</script>
</body>
</html>
